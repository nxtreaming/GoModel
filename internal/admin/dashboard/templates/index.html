{{define "index"}}
<!-- Overview Page -->
<template x-if="page==='overview'">
<div>
    <div class="page-header">
        <h2>Usage Overview</h2>
        <div class="page-header-controls">
            <div class="interval-picker">
                <button class="interval-btn" :class="{active: interval==='daily'}" @click="setInterval('daily')">Daily</button>
                <button class="interval-btn" :class="{active: interval==='weekly'}" @click="setInterval('weekly')">Weekly</button>
                <button class="interval-btn" :class="{active: interval==='monthly'}" @click="setInterval('monthly')">Monthly</button>
                <button class="interval-btn" :class="{active: interval==='yearly'}" @click="setInterval('yearly')">Yearly</button>
            </div>
            {{template "date-picker" .}}
        </div>
    </div>

    <!-- Auth Error Banner -->
    {{template "auth-banner" .}}

    <!-- Summary Cards -->
    <div class="cards">
        <div class="card">
            <div class="card-label">Total Requests</div>
            <div class="card-value" x-text="formatNumber(summary.total_requests)">-</div>
        </div>
        <div class="card">
            <div class="card-label">Input Tokens</div>
            <div class="card-value" x-text="formatNumber(summary.total_input_tokens)">-</div>
        </div>
        <div class="card">
            <div class="card-label">Output Tokens</div>
            <div class="card-value" x-text="formatNumber(summary.total_output_tokens)">-</div>
        </div>
        <div class="card">
            <div class="card-label">Total Tokens</div>
            <div class="card-value" x-text="formatNumber(summary.total_tokens)">-</div>
        </div>
        <div class="card">
            <div class="card-label">Estimated Cost</div>
            <div class="card-value" x-text="formatCost(summary.total_cost)">-</div>
        </div>
        <div class="card" x-show="cacheAnalyticsEnabled()">
            <div class="card-label">Cache Hits</div>
            <div class="card-value" x-text="formatNumber(cacheOverview.summary.total_hits)">-</div>
        </div>
        <div class="card" x-show="cacheAnalyticsEnabled()">
            <div class="card-label">Local Cache Input Tokens</div>
            <div class="card-value" x-text="formatNumber(cacheOverview.summary.total_input_tokens)">-</div>
        </div>
        <div class="card" x-show="cacheAnalyticsEnabled()">
            <div class="card-label">Local Cache Output Tokens</div>
            <div class="card-value" x-text="formatNumber(cacheOverview.summary.total_output_tokens)">-</div>
        </div>
        <div class="card provider-status-flag" x-show="providerStatus.summary.total > 0" :class="providerStatusSummaryClass()">
            <div class="card-label">Provider Status</div>
            <div class="card-value provider-status-value" x-text="providerStatusRatioText()">-</div>
            <button type="button"
                    class="provider-status-card-link"
                    x-show="providerStatusHasIssues()"
                    aria-label="View providers overview"
                    title="View providers overview"
                    x-text="providerStatusSummaryText()"
                    @click="scrollToProviderStatusSection()"></button>
            <span class="provider-status-card-note" x-show="!providerStatusHasIssues()" x-text="providerStatusSummaryText()"></span>
        </div>
    </div>

    <!-- Usage Chart -->
    <div class="chart-container">
        <h3 x-text="chartTitle()">Daily Token Usage</h3>
        <div class="chart-wrapper">
            <canvas id="usageChart"></canvas>
        </div>
        <p class="empty-state" x-show="daily.length === 0 && !loading && !authError">No usage data yet.</p>
    </div>

    <!-- Contribution Calendar -->
    <div class="contribution-calendar-section">
        <div class="contribution-calendar-header">
            <h3>Activity</h3>
            <div class="usage-mode-toggle">
                <button type="button" class="usage-mode-btn" :class="{active: calendarMode==='tokens'}" @click="toggleCalendarMode('tokens')">Tokens</button>
                <button type="button" class="usage-mode-btn" :class="{active: calendarMode==='costs'}" @click="toggleCalendarMode('costs')">Costs</button>
            </div>
        </div>
        <div class="contribution-calendar-grid-wrapper">
            <div class="contribution-calendar-day-labels">
                <span></span>
                <span>Mon</span>
                <span></span>
                <span>Wed</span>
                <span></span>
                <span>Fri</span>
                <span></span>
            </div>
            <div class="contribution-calendar-scroll">
                <div class="contribution-calendar-months">
                    <template x-for="ml in calendarMonthLabels()" :key="ml.key">
                        <span class="contribution-calendar-month-label" :style="'grid-column: ' + (ml.col + 1) + ' / span ' + ml.span" x-text="ml.label"></span>
                    </template>
                </div>
                <div class="contribution-calendar-grid">
                    <template x-for="(week, wi) in buildCalendarGrid()" :key="wi">
                        <div class="contribution-calendar-week">
                            <template x-for="(day, di) in week" :key="wi + '-' + di">
                                <div class="contribution-calendar-cell"
                                     :class="[day.empty ? 'empty' : 'level-' + day.level]"
                                     @mouseenter="showCalendarTooltip($event, day)"
                                     @mouseleave="hideCalendarTooltip()"></div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>
        <div class="contribution-calendar-footer">
            <div class="contribution-calendar-meta">
                <span class="contribution-calendar-summary" x-text="calendarSummaryText()"></span>
            </div>
            <div class="contribution-calendar-legend">
                <span>Less</span>
                <div class="contribution-calendar-cell level-0"></div>
                <div class="contribution-calendar-cell level-1"></div>
                <div class="contribution-calendar-cell level-2"></div>
                <div class="contribution-calendar-cell level-3"></div>
                <div class="contribution-calendar-cell level-4"></div>
                <span>More</span>
            </div>
        </div>
    </div>
    <div class="contribution-calendar-tooltip"
         x-show="calendarTooltip.show"
         x-text="calendarTooltip.text"
         :style="'left: ' + calendarTooltip.x + 'px; top: ' + (calendarTooltip.y - 40) + 'px'"></div>

    <div id="provider-status-section" class="provider-status-section" tabindex="-1" x-show="providerStatus.providers.length > 0">
        <div class="provider-status-section-header">
            <div>
                <h3>Providers Overview</h3>
            </div>
            <button type="button"
                    class="provider-status-toggle"
                    role="switch"
                    :aria-checked="providerStatusDetailsExpanded ? 'true' : 'false'"
                    :title="providerStatusDetailsToggleLabel()"
                    @click="toggleProviderStatusDetails()">
                <span class="provider-status-toggle-copy" x-text="providerStatusDetailsToggleLabel()"></span>
                <span class="provider-status-toggle-track" :class="{ 'is-active': providerStatusDetailsExpanded }">
                    <span class="provider-status-toggle-thumb"></span>
                </span>
            </button>
        </div>
        <div class="provider-status-grid">
            <template x-for="provider in providerStatus.providers" :key="provider.name">
                <article class="provider-status-card">
                    <div class="provider-status-card-head">
                        <div>
                            <h4 class="provider-status-name">
                                <span x-text="provider.name"></span>
                                <span class="provider-status-name-type" x-show="providerTypeLabel(provider)" x-text="'(' + providerTypeLabel(provider) + ')'"></span>
                            </h4>
                        </div>
                        <span class="provider-status-pill" :class="providerStatusBadgeClass(provider.status)" x-text="provider.status_label"></span>
                    </div>

                    <div class="provider-status-meta">
                        <div class="provider-status-meta-item">
                            <span class="provider-status-meta-label">Models Available</span>
                            <span class="provider-status-meta-value mono" x-text="formatNumber(provider.runtime.discovered_model_count)"></span>
                        </div>
                        <div class="provider-status-meta-item">
                            <span class="provider-status-meta-label">Last Checked</span>
                            <span class="provider-status-meta-value mono"
                                  x-text="providerLastCheckedTime(provider)"
                                  :title="providerLastCheckedTitle(provider)"></span>
                        </div>
                    </div>

                    <div class="provider-status-details"
                         :class="{ 'is-expanded': providerStatusDetailsExpanded, 'is-collapsed': !providerStatusDetailsExpanded }"
                         :aria-hidden="providerStatusDetailsExpanded ? 'false' : 'true'">
                        <div class="provider-status-details-inner">
                            <p class="provider-status-reason" x-text="provider.status_reason"></p>
                            <p class="provider-status-error" x-show="provider.last_error" x-text="provider.last_error"></p>

                            <div class="provider-status-config">
                                <div class="provider-status-config-row" x-show="provider.config.base_url">
                                    <span class="provider-status-config-label">Base URL</span>
                                    <code class="provider-status-config-value" x-text="provider.config.base_url"></code>
                                </div>
                                <div class="provider-status-config-row" x-show="provider.config.api_version">
                                    <span class="provider-status-config-label">API Version</span>
                                    <code class="provider-status-config-value" x-text="provider.config.api_version"></code>
                                </div>
                                <div class="provider-status-config-row">
                                    <span class="provider-status-config-label">Configured Models</span>
                                    <span class="provider-status-config-value" x-text="providerModelsSummary(provider)"></span>
                                </div>
                                <div class="provider-status-config-row">
                                    <span class="provider-status-config-label">Retry</span>
                                    <span class="provider-status-config-value" x-text="providerRetrySummary(provider)"></span>
                                </div>
                                <div class="provider-status-config-row">
                                    <span class="provider-status-config-label">Circuit Breaker</span>
                                    <span class="provider-status-config-value" x-text="providerCircuitBreakerSummary(provider)"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            </template>
        </div>
    </div>
</div>
</template>

<!-- Usage Page -->
<template x-if="page==='usage'">
<div>
    <div class="page-header">
        <h2>Usage Analytics</h2>
        <div class="page-header-controls">
            <div class="usage-mode-toggle">
                <button class="usage-mode-btn" :class="{active: usageMode==='tokens'}" @click="toggleUsageMode('tokens')">Tokens</button>
                <button class="usage-mode-btn" :class="{active: usageMode==='costs'}" @click="toggleUsageMode('costs')">Costs</button>
            </div>
            {{template "date-picker" .}}
        </div>
    </div>

    <!-- Auth Error Banner -->
    {{template "auth-banner" .}}

    <div class="cards" x-show="cacheAnalyticsEnabled()">
        <div class="card">
            <div class="card-label">Cache Saved</div>
            <div class="card-value" x-text="formatCost(cacheOverview.summary.total_saved_cost)">-</div>
        </div>
        <div class="card">
            <div class="card-label">Cache Hits</div>
            <div class="card-value" x-text="formatNumber(cacheOverview.summary.total_hits)">-</div>
        </div>
    </div>

    <!-- Usage by Model Chart -->
    <div class="model-chart-section" x-show="modelUsage.length > 0">
        <div class="model-chart-header">
            <h3 x-text="usageMode === 'tokens' ? 'Token Usage by Model' : 'Cost by Model'"></h3>
            <div class="chart-view-toggle" role="group" aria-label="Model usage view">
                <button type="button" class="chart-view-btn" :class="{active: modelUsageView === 'chart'}" :aria-pressed="modelUsageView === 'chart' ? 'true' : 'false'" aria-label="Show model usage chart" title="Chart" @click="toggleUsageChartView('model', 'chart')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V11M12 19V5M19 19v-8"/></svg>
                </button>
                <button type="button" class="chart-view-btn" :class="{active: modelUsageView === 'table'}" :aria-pressed="modelUsageView === 'table' ? 'true' : 'false'" aria-label="Show model usage table" title="Table" @click="toggleUsageChartView('model', 'table')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16M9 6v12M15 6v12"/></svg>
                </button>
            </div>
        </div>
        <div class="bar-chart-wrap" x-show="modelUsageView === 'chart'">
            <canvas id="usageBarChart"></canvas>
        </div>
        <template x-if="modelUsageView === 'table'">
            <div class="table-wrapper usage-chart-table-wrapper">
                <table class="data-table usage-chart-data-table">
                    <thead>
                        <tr>
                            <th>Model</th>
                            <th>Provider</th>
                            <th class="col-price">Input Tokens</th>
                            <th class="col-price">Output Tokens</th>
                            <th class="col-price">Total Tokens</th>
                            <th class="col-price">Input Cost</th>
                            <th class="col-price">Output Cost</th>
                            <th class="col-price">Total Cost</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="row in modelUsageTableRows()" :key="(row.provider_name || row.provider || '-') + '/' + row.model">
                            <tr>
                                <td class="mono font-size-md" x-text="row.model || '-'"></td>
                                <td><span class="provider-badge" x-text="providerDisplayValue(row) || '-'"></span></td>
                                <td class="col-price" x-text="formatNumber(row.input_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(row.output_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(usageRowTotalTokens(row))"></td>
                                <td class="col-price" x-text="formatCost(row.input_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.output_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.total_cost)"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>

    <!-- Usage by User Path Chart -->
    <div class="model-chart-section" x-show="userPathUsage.length > 0">
        <div class="model-chart-header">
            <h3 x-text="usageMode === 'costs' ? 'Cost by User Path' : 'Usage by User Path'"></h3>
            <div class="chart-view-toggle" role="group" aria-label="User path usage view">
                <button type="button" class="chart-view-btn" :class="{active: userPathUsageView === 'chart'}" :aria-pressed="userPathUsageView === 'chart' ? 'true' : 'false'" aria-label="Show user path usage chart" title="Chart" @click="toggleUsageChartView('userPath', 'chart')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V11M12 19V5M19 19v-8"/></svg>
                </button>
                <button type="button" class="chart-view-btn" :class="{active: userPathUsageView === 'table'}" :aria-pressed="userPathUsageView === 'table' ? 'true' : 'false'" aria-label="Show user path usage table" title="Table" @click="toggleUsageChartView('userPath', 'table')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16M9 6v12M15 6v12"/></svg>
                </button>
            </div>
        </div>
        <div class="bar-chart-wrap" x-show="userPathUsageView === 'chart'">
            <canvas id="usageUserPathChart"></canvas>
        </div>
        <template x-if="userPathUsageView === 'table'">
            <div class="table-wrapper usage-chart-table-wrapper">
                <table class="data-table usage-chart-data-table">
                    <thead>
                        <tr>
                            <th>User Path</th>
                            <th class="col-price">Input Tokens</th>
                            <th class="col-price">Output Tokens</th>
                            <th class="col-price">Total Tokens</th>
                            <th class="col-price">Input Cost</th>
                            <th class="col-price">Output Cost</th>
                            <th class="col-price">Total Cost</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="row in userPathUsageTableRows()" :key="row.user_path || '/'">
                            <tr>
                                <td class="mono font-size-md" x-text="row.user_path || '/'"></td>
                                <td class="col-price" x-text="formatNumber(row.input_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(row.output_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(usageRowTotalTokens(row))"></td>
                                <td class="col-price" x-text="formatCost(row.input_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.output_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.total_cost)"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>

    <!-- Request Log Section -->
    <div class="usage-log-section">
        <h3>Request Log</h3>
        <div class="usage-log-toolbar">
            <input type="text" placeholder="Search by request ID, model, provider..." x-model="usageLogSearch" @input.debounce.300ms="fetchUsageLog(true)" class="filter-input">
            <select x-model="usageLogModel" @change="fetchUsageLog(true)" class="usage-log-select">
                <option value="">All Models</option>
                <template x-for="m in usageLogModelOptions()" :key="m">
                    <option :value="m" x-text="m"></option>
                </template>
            </select>
            <select x-model="usageLogProvider" @change="fetchUsageLog(true)" class="usage-log-select">
                <option value="">All Providers</option>
                <template x-for="p in usageLogProviderOptions()" :key="p">
                    <option :value="p" x-text="p"></option>
                </template>
            </select>
            <input type="text" placeholder="User path /team/alpha" aria-label="Filter by user path" x-model="usageLogUserPath" @input.debounce.300ms="fetchUsageLog(true)" class="filter-input">
        </div>
        <div class="table-wrapper" x-show="usageLog.entries.length > 0">
            <table class="data-table usage-log-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Model</th>
                        <th>Provider</th>
                        <th>User Path</th>
                        <th class="col-price" x-text="usageMode === 'costs' ? 'Input Cost' : 'Input'"></th>
                        <th class="col-price" x-text="usageMode === 'costs' ? 'Output Cost' : 'Output'"></th>
                        <th class="col-price" x-text="usageMode === 'costs' ? 'Total Cost' : 'Total'"></th>
                        <th class="col-price" x-show="usageMode === 'tokens'">Cost</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="entry in usageLog.entries" :key="entry.id">
                        <tr>
                            <td class="mono usage-ts" x-text="formatTimestamp(entry.timestamp)" :title="timestampTitle(entry.timestamp)"></td>
                            <td class="mono font-size-md" x-text="entry.model"></td>
                            <td>
                                <span class="provider-badge" x-text="providerDisplayValue(entry) || '-'"></span>
                            </td>
                            <td class="mono font-size-md" x-text="entry.user_path || '-'"></td>
                            <td class="col-price"
                                x-text="usageMode === 'costs' ? formatCost(entry.input_cost) : formatNumber(entry.input_tokens)"
                                :title="usageMode === 'costs' ? formatNumber(entry.input_tokens) + ' tokens' : ''"></td>
                            <td class="col-price"
                                x-text="usageMode === 'costs' ? formatCost(entry.output_cost) : formatNumber(entry.output_tokens)"
                                :title="usageMode === 'costs' ? formatNumber(entry.output_tokens) + ' tokens' : ''"></td>
                            <td class="col-price">
                                <span x-text="usageMode === 'costs' ? formatCost(entry.total_cost) : formatNumber(entry.total_tokens)"
                                      :title="usageMode === 'costs' ? formatNumber(entry.total_tokens) + ' tokens\n' + formatCostTooltip(entry) : ''"></span>
                                <span class="caveat-icon" x-show="usageMode === 'costs' && entry.costs_calculation_caveat" :title="entry.costs_calculation_caveat">&#9888;</span>
                            </td>
                            <td class="col-price" x-show="usageMode === 'tokens'"
                                :title="formatCostTooltip(entry)">
                                <span x-text="formatCost(entry.total_cost)"></span>
                                <span class="caveat-icon" x-show="entry.costs_calculation_caveat" :title="entry.costs_calculation_caveat">&#9888;</span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <p class="empty-state" x-show="usageLog.entries.length === 0 && !loading && !authError">No usage log entries found.</p>
        <!-- Pagination -->
        {{template "pagination" "usageLog"}}
    </div>
</div>
</template>

<!-- Settings Page -->
<template x-if="page==='settings'">
<div>
    <div class="page-header">
        <div>
            <h2>Settings</h2>
            <p class="page-subtitle">Dashboard preferences.</p>
        </div>
    </div>

    {{template "auth-banner" .}}

    <div class="settings-subnav">
        <button type="button" class="settings-subnav-btn active" @click="navigateSettings('general')">General</button>
    </div>

    <div class="settings-panel">
        <div class="settings-panel-header">
            {{template "helper-disclosure" "{ heading: 'Timezone', open: false, copyId: 'timezone-help-copy', showLabel: 'Show timezone help', hideLabel: 'Hide timezone help', text: 'Day-based analytics, charts, and date filters use your effective timezone. Usage and audit logs keep UTC in the hover title while rendering row timestamps in your effective timezone.' }"}}
        </div>

        <div class="settings-form-grid">
            <label class="alias-form-field">
                <span>Timezone Override</span>
                <select class="usage-log-select settings-select" x-ref="timezoneOverrideSelect" x-model="timezoneOverride" x-effect="timezoneOptions.length; timezoneOverride; $nextTick(() => syncTimezoneOverrideSelectValue())" @focus="ensureTimezoneOptions()" @change="saveTimezoneOverride()">
                    <option value="" :selected="!timezoneOverride" x-text="'Automatic (' + detectedTimeZoneLabel() + ')'"></option>
                    <template x-for="timeZone in timezoneOptions" :key="timeZone.value">
                        <option :value="timeZone.value" :selected="timeZone.value === timezoneOverride" x-text="timeZone.label"></option>
                    </template>
                </select>
            </label>
        </div>
        <div class="alias-form-actions">
            <button type="button" class="pagination-btn" x-show="timezoneOverride" @click="clearTimezoneOverride()">Use Browser Timezone</button>
        </div>

        <div class="settings-refresh-section">
            <div>
                <h3>Runtime Refresh</h3>
                <p>Pull the latest model metadata, provider inventory, API keys, aliases, model access rules, guardrails, and workflows.</p>
            </div>
            <button type="button"
                    class="pagination-btn pagination-btn-primary"
                    :disabled="runtimeRefreshLoading"
                    @click="refreshRuntime()"
                    x-text="runtimeRefreshLoading ? 'Refreshing...' : 'Refresh Runtime'"></button>
        </div>

        <div class="loading-state settings-refresh-loading"
             x-show="runtimeRefreshLoading"
             role="status"
             aria-live="polite">
            <span class="loading-spinner" aria-hidden="true"></span>
            <span>Generating runtime report...</span>
        </div>
        <div>
            <div class="alert alert-success settings-refresh-alert"
                 role="status"
                 aria-live="polite"
                 aria-atomic="true"
                 x-show="runtimeRefreshNotice && runtimeRefreshSucceeded()"
                 x-text="runtimeRefreshNotice"></div>
            <div class="alert alert-warning settings-refresh-alert"
                 role="alert"
                 aria-live="assertive"
                 aria-atomic="true"
                 x-show="runtimeRefreshError || (runtimeRefreshNotice && runtimeRefreshWarnings())"
                 x-text="runtimeRefreshError || runtimeRefreshNotice"></div>
            <ul class="runtime-refresh-steps"
                role="status"
                aria-live="polite"
                x-show="runtimeRefreshReport && runtimeRefreshReport.steps && runtimeRefreshReport.steps.length > 0">
                <template x-for="step in runtimeRefreshReport.steps" :key="step.name">
                    <li :class="'runtime-refresh-step is-' + step.status" x-text="runtimeRefreshStepLabel(step)"></li>
                </template>
            </ul>
        </div>
    </div>
</div>
</template>

<!-- Guardrails Page -->
<template x-if="page==='guardrails'">
<div>
    <div class="page-header">
        <div>
            <h2>Guardrails</h2>
            <p class="page-subtitle">Reusable policy objects stored in the database and kept hot in memory for workflow execution.</p>
        </div>
    </div>

    <div class="settings-guardrails-hero">
        <div>
            <p class="settings-kicker">Reusable Policy Objects</p>
            <h3>Guardrail Library</h3>
            <p>Store guardrails in the database, keep them hot in memory, and attach them to workflows by reference.</p>
        </div>
        <div class="settings-guardrails-meta">
            <div class="settings-guardrails-stat">
                <span class="settings-guardrails-stat-label">Instances</span>
                <strong x-text="formatNumber(guardrails.length)"></strong>
            </div>
            <div class="settings-guardrails-stat">
                <span class="settings-guardrails-stat-label">Types</span>
                <strong x-text="formatNumber(guardrailTypes.length)"></strong>
            </div>
        </div>
    </div>

    {{template "auth-banner" .}}

    <div class="alert alert-warning" x-show="!guardrailsRuntimeEnabled()">
        Runtime guardrail execution is currently off because <code>GUARDRAILS_ENABLED</code> is disabled. You can still manage definitions here.
    </div>
    <div class="alert alert-warning" x-show="!authError && !guardrailsAvailable">
        Guardrails feature is unavailable.
    </div>
    <div class="alert alert-warning" x-show="!authError && guardrailError" x-text="guardrailError"></div>
    <div class="alert alert-success" x-show="!authError && guardrailNotice && !guardrailError" x-text="guardrailNotice"></div>

    <div class="model-alias-editor" x-show="guardrailFormOpen">
        <div class="alias-form">
            <div class="aliases-editor-header">
                <div>
                    <h3 x-text="guardrailFormMode === 'edit' ? 'Edit Guardrail' : 'Create Guardrail'"></h3>
                    <p class="alias-form-hint">Workflows reference these names directly, so renames are intentionally avoided after creation.</p>
                </div>
                <button type="button" class="table-action-btn alias-close-btn table-icon-btn" aria-label="Close guardrail editor" @click="closeGuardrailForm()">
                    {{template "x-icon"}}
                </button>
            </div>

            <div class="alias-form-grid">
                <label class="alias-form-field">
                    <span>Name</span>
                    <input type="text" class="filter-input" placeholder="safety-system-prompt" x-model="guardrailForm.name" :disabled="guardrailFormMode === 'edit'">
                </label>

                <label class="alias-form-field">
                    <span>Type</span>
                    <select class="usage-log-select settings-select" x-ref="guardrailTypeSelect" x-model="guardrailForm.type" x-effect="guardrailTypes.length; guardrailForm.type; $nextTick(() => syncGuardrailTypeSelectValue())" :disabled="guardrailFormMode === 'edit'" @change="onGuardrailTypeChange()">
                        <template x-for="typeDef in guardrailTypes" :key="typeDef.type">
                            <option :value="typeDef.type" x-text="typeDef.label"></option>
                        </template>
                    </select>
                </label>

                <label class="alias-form-field">
                    <span>Description</span>
                    <input type="text" class="filter-input" placeholder="What this guardrail is meant to do" x-model="guardrailForm.description">
                </label>

                <label class="alias-form-field">
                    <span>User Path</span>
                    <input type="text" class="filter-input" placeholder="/team/alpha" x-model="guardrailForm.user_path" aria-label="Guardrail user path">
                    <small class="alias-form-hint">Only used for auxiliary rewrite (llm_based_altering) guardrails; ignored for other guardrail types.</small>
                </label>

                <template x-for="field in guardrailTypeFields(guardrailForm.type)" :key="field.key">
                    <div>
                        <template x-if="field.input !== 'checkboxes'">
                            <label class="alias-form-field alias-form-field-wide">
                                <span x-text="field.label"></span>
                                <template x-if="field.input === 'select'">
                                    <select class="usage-log-select settings-select" :value="guardrailFieldValue(field)" @change="setGuardrailFieldValue(field, $event.target.value)">
                                        <template x-for="option in field.options" :key="option.value">
                                            <option :value="option.value" x-text="option.label"></option>
                                        </template>
                                    </select>
                                </template>
                                <template x-if="field.input === 'textarea'">
                                    <textarea class="settings-guardrail-textarea" :placeholder="field.placeholder || ''" :value="guardrailFieldValue(field)" @input="setGuardrailFieldValue(field, $event.target.value)"></textarea>
                                </template>
                                <template x-if="field.input !== 'select' && field.input !== 'textarea'">
                                    <input :type="field.input || 'text'" class="filter-input" :placeholder="field.placeholder || ''" :value="guardrailFieldValue(field)" @input="setGuardrailFieldValue(field, $event.target.value)">
                                </template>
                                <small class="alias-form-hint" x-show="field.help" x-text="field.help"></small>
                            </label>
                        </template>
                        <template x-if="field.input === 'checkboxes'">
                            <fieldset class="alias-form-field alias-form-field-wide alias-form-field-fieldset" :aria-describedby="field.help ? 'guardrail-field-help-' + field.key : null">
                                <legend class="alias-form-field-legend" x-text="field.label"></legend>
                                <div class="execution-plan-feature-toggles">
                                    <template x-for="option in field.options" :key="field.key + '-' + option.value">
                                        <label class="execution-plan-feature-toggle">
                                            <input type="checkbox" :checked="guardrailArrayFieldSelected(field, option.value)" @change="toggleGuardrailArrayFieldValue(field, option.value, $event.target.checked)">
                                            <span x-text="option.label"></span>
                                        </label>
                                    </template>
                                </div>
                                <small class="alias-form-hint" :id="'guardrail-field-help-' + field.key" x-show="field.help" x-text="field.help"></small>
                            </fieldset>
                        </template>
                    </div>
                </template>
            </div>

            <div class="alias-form-actions">
                <button type="button" class="pagination-btn" @click="closeGuardrailForm()">Cancel</button>
                <button type="button" class="pagination-btn pagination-btn-primary" :disabled="guardrailFormSubmitting" @click="submitGuardrailForm()">Save Guardrail</button>
            </div>
        </div>
    </div>

    <div class="settings-guardrails-layout">
        <section class="settings-panel settings-guardrails-list">
            <div class="aliases-editor-header">
                <div>
                    <h3>Instances</h3>
                    <p class="alias-form-hint">Each instance has a reusable name, a type, an optional user path for future UI visibility scoping, and a JSON-backed config payload for that type.</p>
                </div>
                <button type="button" class="pagination-btn pagination-btn-primary" :disabled="guardrailTypesLoading || guardrailFormSubmitting || !guardrailsAvailable" @click="openGuardrailCreate()">Create Guardrail</button>
            </div>

            <div class="table-toolbar" x-show="guardrailsAvailable">
                <div class="table-toolbar-main">
                    <input type="text" id="guardrail-filter" class="filter-input" placeholder="Filter by name, type, user path, summary..." aria-label="Guardrail filter" x-model="guardrailFilter">
                </div>
            </div>

            <div class="table-wrapper" x-show="filteredGuardrails.length > 0">
                <table class="data-table settings-guardrails-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>User Path</th>
                            <th>Summary</th>
                            <th class="col-actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="guardrail in filteredGuardrails" :key="guardrail.name">
                            <tr>
                                <td class="mono font-size-md" x-text="guardrail.name"></td>
                                <td><span class="settings-guardrail-type-pill" x-text="guardrailTypeLabel(guardrail.type)"></span></td>
                                <td class="mono font-size-md" x-text="guardrail.user_path || '\u2014'"></td>
                                <td>
                                    <div class="settings-guardrail-summary" x-text="guardrail.summary || guardrail.description || 'No summary yet.'"></div>
                                    <div class="settings-guardrail-description" x-show="guardrail.description" x-text="guardrail.description"></div>
                                </td>
                                <td class="col-actions">
                                    <div class="alias-actions-cell">
                                        <button type="button" class="table-action-btn table-icon-btn"
                                            :aria-label="'Edit guardrail ' + guardrail.name"
                                            :title="'Edit guardrail ' + guardrail.name"
                                            @click="openGuardrailEdit(guardrail)">
                                            {{template "edit-icon"}}
                                        </button>
                                        <button type="button" class="table-action-btn table-action-btn-danger table-icon-btn"
                                            :disabled="guardrailDeletingName === guardrail.name"
                                            :aria-label="guardrailDeletingName === guardrail.name ? 'Deleting guardrail ' + guardrail.name : 'Delete guardrail ' + guardrail.name"
                                            :title="guardrailDeletingName === guardrail.name ? 'Deleting guardrail ' + guardrail.name : 'Delete guardrail ' + guardrail.name"
                                            @click="deleteGuardrail(guardrail)">
                                            {{template "x-icon"}}
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <p class="empty-state" x-show="filteredGuardrails.length === 0 && !guardrailsLoading && guardrailsAvailable && !guardrailError && !authError">
                No guardrails defined yet.
            </p>
        </section>
    </div>
</div>
</template>

<!-- API Keys Page -->
<template x-if="page==='auth-keys'">
<div>
    <div class="page-header">
        <h2>API Keys</h2>
        <div class="page-header-controls">
            <button type="button" class="pagination-btn pagination-btn-primary pagination-btn-with-icon"
                x-show="authKeysAvailable && !authError"
                :disabled="authKeyFormSubmitting"
                @click="if (!authKeyFormSubmitting) openAuthKeyForm()">
                {{template "plus-icon"}}
                <span>Create API Key</span>
            </button>
        </div>
    </div>

    {{template "auth-banner" .}}

    <div class="alert alert-warning" x-show="!authKeysAvailable && !authError">
        API key management is unavailable.
    </div>
    <p class="alias-form-error" x-show="authKeyError && !authError" x-text="authKeyError"></p>
    <p class="alias-form-hint" x-show="authKeyNotice && !authKeyFormOpen" x-text="authKeyNotice"></p>

    <p class="alias-form-hint auth-keys-help-notice" x-show="authKeysAvailable && !authError">
        Managed API keys authenticate requests to the gateway. Deactivation is permanent — create a new key if access needs to be restored.
    </p>

    <div class="model-alias-editor auth-key-editor" x-show="authKeyFormOpen">
        <form class="alias-form" @submit.prevent="submitAuthKeyForm()">
            <div class="aliases-editor-header">
                <div>
                    <p class="alias-form-kicker">Managed key</p>
                    <h3>Create API Key</h3>
                </div>
                <button type="button" class="table-action-btn alias-close-btn"
                    aria-label="Close" @click="closeAuthKeyForm()">&#x2715;</button>
            </div>

            <div class="auth-key-issued-banner" x-show="authKeyIssuedValue">
                <p class="auth-key-issued-warning">
                    Store this key securely &mdash; it won&rsquo;t be shown again.
                </p>
                <div class="auth-key-issued-value-row">
                    <code class="auth-key-issued-token" x-text="authKeyIssuedValue"></code>
                    <button type="button" class="pagination-btn copy-feedback-btn"
                        :class="{ 'copy-feedback-btn-copied': authKeyCopyState.copied }"
                        @click="copyAuthKeyValue()">
                        <template x-if="!authKeyCopyState.copied">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        </template>
                        <template x-if="authKeyCopyState.copied">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>
                        </template>
                        <span x-text="authKeyCopyState.copied ? 'Copied' : 'Copy'"></span>
                    </button>
                </div>
                <p class="alias-form-error" x-show="authKeyCopyState.error">
                    Unable to copy the key automatically. Copy it manually.
                </p>
                <div class="alias-form-actions">
                    <button type="button" class="pagination-btn pagination-btn-primary"
                        @click="dismissIssuedKey()">Done, I&rsquo;ve stored it</button>
                </div>
            </div>

            <div class="auth-key-form-fields" x-show="!authKeyIssuedValue">
                <div class="alias-form-grid">
                    <label class="alias-form-field">
                        <span>Name <span class="alias-form-hint">(required)</span></span>
                        <input type="text" class="filter-input" placeholder="e.g. ci-deploy"
                            x-model="authKeyForm.name" autocomplete="off">
                    </label>
                    <label class="alias-form-field">
                        <span>Expires <span class="alias-form-hint">(optional, valid through the selected date)</span></span>
                        <input type="date" class="filter-input" x-model="authKeyForm.expires_at">
                    </label>
                </div>
                <label class="alias-form-field">
                    <span>User Path (optional)</span>
                    <input type="text" class="filter-input" placeholder="ex. /department1/team-a"
                        x-model="authKeyForm.user_path" aria-label="API key user path" aria-describedby="auth-key-user-path-help-copy">
                </label>
                <div class="auth-key-inline-help">
                    {{template "helper-disclosure" "{ heading: 'User Path Override', open: false, copyId: 'auth-key-user-path-help-copy', showLabel: 'Show API key user path help', hideLabel: 'Hide API key user path help', text: 'When set, this key overrides X-GoModel-User-Path for audit logging and downstream request context.' }"}}
                </div>
                <label class="alias-form-field">
                    <span>Description (optional)</span>
                    <textarea rows="2" class="alias-form-textarea"
                        placeholder="What is this key used for?"
                        x-model="authKeyForm.description"></textarea>
                </label>
                <p class="alias-form-error" x-show="authKeyError" x-text="authKeyError"></p>
                <div class="alias-form-actions">
                    <button type="submit" class="pagination-btn pagination-btn-primary pagination-btn-with-icon"
                        :disabled="authKeyFormSubmitting">
                        <span x-show="!authKeyFormSubmitting" aria-hidden="true">
                            {{template "plus-icon"}}
                        </span>
                        <span x-text="authKeyFormSubmitting ? 'Creating...' : 'Create API Key'"></span>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div class="table-wrapper" x-show="authKeys.length > 0 && authKeysAvailable">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>User Path</th>
                    <th>Token</th>
                    <th>Status</th>
                    <th>Expires</th>
                    <th>Created</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <template x-for="key in authKeys" :key="key.id">
                    <tr>
                        <td x-text="key.name"></td>
                        <td class="auth-key-description" x-text="key.description || '\u2014'"></td>
                        <td x-text="key.user_path || '\u2014'"></td>
                        <td><code class="auth-key-redacted" x-text="key.redacted_value"></code></td>
                        <td>
                            <span class="auth-key-status-badge"
                                :class="key.active ? 'auth-key-status-active' : 'auth-key-status-inactive'"
                                x-text="key.active ? 'Active' : 'Inactive'"></span>
                        </td>
                        <td :title="key.expires_at ? formatTimestampUTC(key.expires_at) : ''"
                            x-text="key.expires_at ? formatDateUTC(key.expires_at) : '\u2014'"></td>
                        <td x-text="formatTimestamp(key.created_at)"></td>
                        <td>
                            <button type="button" class="table-action-btn table-action-btn-danger"
                                x-show="key.active"
                                :disabled="authKeyDeactivatingID === key.id"
                                @click="deactivateAuthKey(key)"
                                x-text="authKeyDeactivatingID === key.id ? 'Deactivating...' : 'Deactivate'"></button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <p class="empty-state"
        x-show="authKeys.length === 0 && !authKeysLoading && !authError && !authKeyError && authKeysAvailable">
        No API keys yet. Issue a key to get started.
    </p>
</div>
</template>

<!-- Models Page -->
<template x-if="page==='models'">
<div>
    <div class="page-header">
        <h2>Registered Models</h2>
        <div class="model-count" x-show="displayModels.length > 0">
            <span x-text="modelFilter ? filteredDisplayModels.length + ' / ' + displayModels.length : displayModels.length"></span> models
        </div>
    </div>

    <!-- Auth Error Banner -->
    {{template "auth-banner" .}}
    <div class="alert alert-warning" x-show="!aliasesAvailable && !authError">
        Aliases feature is unavailable.
    </div>
    <div class="alert alert-warning" x-show="aliasError && !authError" x-text="aliasError"></div>
    <div class="alert alert-success" x-show="aliasNotice" x-text="aliasNotice"></div>
    <div class="alert alert-warning" x-show="modelOverrideError && !authError" x-text="modelOverrideError"></div>
    <div class="alert alert-success" x-show="modelOverrideNotice && !modelOverrideError" x-text="modelOverrideNotice"></div>

    <!-- Category Tabs -->
    <div class="category-tabs" x-show="categories.length > 0">
        <template x-for="cat in categories" :key="cat.category">
            <button class="category-tab" :class="{ active: activeCategory === cat.category }" @click="selectCategory(cat.category)">
                <span x-text="cat.display_name"></span>
                <span class="tab-count" x-text="cat.count"></span>
            </button>
        </template>
    </div>

    <!-- Filter -->
    <div class="table-toolbar" x-show="displayModels.length > 0 || modelFilter || aliasesAvailable">
        <div class="table-toolbar-main">
            <input type="text" placeholder="Filter by provider, provider/model, alias, or owner..." x-model="modelFilter" class="filter-input models-filter-input">
        </div>
        <div class="table-toolbar-actions">
            <button type="button" class="pagination-btn pagination-btn-primary" x-show="aliasesAvailable" @click="openAliasCreate()">Create Alias</button>
        </div>
    </div>

    <div class="loading-state" x-show="modelsLoading && !authError" role="status" aria-live="polite">
        <span class="loading-spinner" aria-hidden="true"></span>
        <span x-text="displayModels.length > 0 ? 'Refreshing models...' : 'Loading models...'"></span>
    </div>

    <div class="model-alias-editor" x-show="aliasFormOpen">
        <form class="alias-form" @submit.prevent="submitAliasForm()">
            <div class="aliases-editor-header">
                <div>
                    <p class="alias-form-kicker" x-text="aliasFormMode === 'edit' ? 'Edit alias' : 'Create alias'"></p>
                    <h3 x-text="aliasFormMode === 'edit' ? (aliasForm.name || aliasFormOriginalName) : 'New Alias'"></h3>
                </div>
                <button type="button" class="table-action-btn alias-close-btn table-icon-btn" aria-label="Close alias editor" @click="closeAliasForm()">
                    {{template "x-icon"}}
                </button>
            </div>

            <div class="alias-form-grid">
                <label class="alias-form-field">
                    <span>Alias name</span>
                    <input type="text" class="filter-input mono" placeholder="smart" x-model="aliasForm.name">
                </label>

                <label class="alias-form-field">
                    <span>Target model</span>
                    <input type="text" list="alias-model-options" class="filter-input mono" placeholder="openai/gpt-4o" x-model="aliasForm.target_model">
                </label>
            </div>

            <datalist id="alias-model-options">
                <template x-for="m in models" :key="qualifiedModelName(m)">
                    <option :value="qualifiedModelName(m)" x-text="qualifiedModelName(m)"></option>
                </template>
            </datalist>

            <label class="alias-form-field">
                <span>Description</span>
                <textarea rows="3" class="alias-form-textarea" placeholder="Optional description" x-model="aliasForm.description"></textarea>
            </label>

            <p class="alias-form-hint">
                Aliases are not supported on pass-through endpoints.
            </p>

            <label class="alias-checkbox">
                <input type="checkbox" x-model="aliasForm.enabled">
                <span>Alias is enabled</span>
            </label>

            <p class="alias-form-hint" x-show="aliasFormMode === 'edit'">
                Renaming an alias creates the new name first, then removes the old one.
            </p>

            <div class="alert alert-warning" x-show="aliasFormError" x-text="aliasFormError"></div>

            <div class="alias-form-actions">
                <button type="submit" class="pagination-btn pagination-btn-primary" :disabled="aliasSubmitting" x-text="aliasSubmitting ? 'Saving...' : (aliasFormMode === 'edit' ? 'Save Alias' : 'Create Alias')"></button>
            </div>
        </form>
    </div>

    <div class="model-alias-editor" x-show="modelOverrideFormOpen" x-ref="modelOverrideEditor">
        <form class="alias-form" @submit.prevent="submitModelOverrideForm()">
                <div class="aliases-editor-header">
                    <div>
                    <p class="alias-form-kicker">Access override</p>
                    <h3 x-text="modelOverrideFormDisplayName || modelOverrideForm.selector || 'Access'"></h3>
                    </div>
                    <button type="button" class="table-action-btn alias-close-btn table-icon-btn" aria-label="Close model access editor" @click="closeModelOverrideForm()">
                        {{template "x-icon"}}
                    </button>
            </div>

            <label class="alias-form-field">
                <span>Selector</span>
                <input type="text" class="filter-input mono" x-model="modelOverrideForm.selector" disabled>
            </label>

            <p class="alias-form-hint">
                The selector uses <code>/</code> for all providers and models, <code>{provider_name}/</code> for one provider, or <code>{provider_name}/{model}</code> for one model. <code>user_paths</code> is matched against the effective managed API key <code>user_path</code>.
            </p>
            <p class="alias-form-hint" x-text="'Default enabled: ' + (modelOverrideFormDefaultEnabled ? 'yes' : 'no') + ' · Effective now: ' + (modelOverrideFormEffectiveEnabled ? 'yes' : 'no')"></p>

            <label class="alias-form-field">
                <span>User Paths</span>
                <textarea rows="4" class="alias-form-textarea mono" placeholder="/&#10;/team/alpha&#10;/non-existing" x-model="modelOverrideForm.user_paths"></textarea>
            </label>

            <p class="alias-form-hint">
                Use <code>/</code> to allow every user path. Use a team path to restrict to that subtree, or an unused path to make the selector unavailable.
            </p>

            <div class="alert alert-warning" x-show="modelOverrideError" x-text="modelOverrideError"></div>

            <div class="alias-form-actions">
                <button type="button" class="pagination-btn" @click="closeModelOverrideForm()">Cancel</button>
                <button type="button" class="pagination-btn pagination-btn-danger-outline" x-show="modelOverrideFormHasExistingOverride" :disabled="modelOverrideSubmitting" @click="deleteModelOverride()">Remove Override</button>
                <button type="submit" class="pagination-btn pagination-btn-primary" :disabled="modelOverrideSubmitting" x-text="modelOverrideSubmitting ? 'Saving...' : 'Save Access'"></button>
            </div>
        </form>
    </div>

    <!-- Models Table: All / Text Generation -->
    <template x-if="(displayModels.length > 0 || modelFilter) && (activeCategory === 'all' || activeCategory === 'text_generation')">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th>Modes</th>
                    <th class="col-price">Input<br>$/MTok</th>
                    <th class="col-price">Output<br>$/MTok</th>
                    <th class="col-price" x-show="activeCategory === 'text_generation'">Cached $/MTok</th>
                    <th class="model-actions-header">
                        <button type="button" class="table-action-btn table-icon-btn"
                            x-show="modelOverridesAvailable"
                            :class="modelOverrideEditButtonClass(hasGlobalModelOverride())"
                            :aria-label="modelOverrideEditButtonLabel('global model access', hasGlobalModelOverride())"
                            :title="modelOverrideEditButtonLabel('global model access', hasGlobalModelOverride())"
                            @click="openGlobalModelOverrideEdit()">
                            {{template "edit-icon"}}
                        </button>
                    </th>
                </tr>
            </thead>
            {{template "model-table-body" .}}
        </table>
    </div>
    </template>

    <!-- Models Table: Embeddings -->
    <template x-if="(displayModels.length > 0 || modelFilter) && activeCategory === 'embedding'">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th class="col-price">Input<br>$/MTok</th>
                    <th class="model-actions-header">
                        <button type="button" class="table-action-btn table-icon-btn"
                            x-show="modelOverridesAvailable"
                            :class="modelOverrideEditButtonClass(hasGlobalModelOverride())"
                            :aria-label="modelOverrideEditButtonLabel('global model access', hasGlobalModelOverride())"
                            :title="modelOverrideEditButtonLabel('global model access', hasGlobalModelOverride())"
                            @click="openGlobalModelOverrideEdit()">
                            {{template "edit-icon"}}
                        </button>
                    </th>
                </tr>
            </thead>
            {{template "model-table-body" .}}
        </table>
    </div>
    </template>

    <!-- Models Table: Image -->
    <template x-if="(displayModels.length > 0 || modelFilter) && activeCategory === 'image'">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th class="col-price">$/Image</th>
                    <th class="model-actions-header">
