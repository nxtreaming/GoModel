<!-- Workflows Page -->
<template x-if="page==='workflows'">
<div>
    <div class="page-header">
        <div>
            <h2>Workflows</h2>
            <p class="execution-plan-page-note">Active workflows are matched path-first: deepest user path wins first, then provider name and model specificity, then broader matches, then global.</p>
        </div>
        <div class="page-header-controls">
            <button type="button" class="pagination-btn pagination-btn-primary" x-show="executionPlansAvailable" @click="openExecutionPlanCreate()">New Workflow</button>
        </div>
    </div>

    {{template "auth-banner" .}}
    <div class="alert alert-warning" x-show="!executionPlansAvailable && !authError">
        Workflows feature is unavailable.
    </div>
    <div class="alert alert-warning" x-show="executionPlanError && !authError" x-text="executionPlanError"></div>
    <div class="alert alert-success" x-show="executionPlanNotice" x-text="executionPlanNotice"></div>

    <div class="table-toolbar" x-show="executionPlansAvailable">
        <div class="table-toolbar-main">
            <input type="text" placeholder="Filter by scope, name, hash, or guardrail..." x-model="executionPlanFilter" class="filter-input" aria-label="Filter workflows by scope, name, hash, or guardrail">
        </div>
        <div class="table-toolbar-actions">
            <span class="model-count" x-text="filteredExecutionPlans.length + ' active scopes'"></span>
        </div>
    </div>

    <div class="execution-plans-layout" :class="{ 'is-editor-open': executionPlanFormOpen }">
        <section class="model-alias-editor execution-plan-editor" x-show="executionPlanFormOpen">
            <form class="alias-form" @submit.prevent="submitExecutionPlanForm()">
                <div class="aliases-editor-header">
                    <div>
                        {{template "helper-disclosure" "{ heading: 'Workflow', open: false, copyId: 'workflow-help-copy', showLabel: 'Show workflow help', hideLabel: 'Hide workflow help', text: 'Create immutable version. Submitting activates it for the selected scope.' }"}}
                    </div>
                    <button type="button" class="table-action-btn alias-close-btn table-icon-btn" aria-label="Close workflow editor" @click="closeExecutionPlanForm()">
                        {{template "x-icon"}}
                    </button>
                </div>

                <div class="alert alert-warning" x-show="executionPlanFormError" x-text="executionPlanFormError"></div>

                <div class="alias-form-grid">
                    <label class="alias-form-field">
                        <span>Provider Name</span>
                        <select class="usage-log-select execution-plan-input" x-model="executionPlanForm.scope_provider" @change="setExecutionPlanProvider(executionPlanForm.scope_provider)">
                            <option value="">All providers and models</option>
                            <template x-for="providerName in executionPlanProviderOptions()" :key="providerName">
                                <option :value="providerName" x-text="providerName"></option>
                            </template>
                        </select>
                    </label>

                    <label class="alias-form-field" x-show="executionPlanForm.scope_provider">
                        <span>Model</span>
                        <select class="usage-log-select execution-plan-input" x-model="executionPlanForm.scope_model">
                            <option value="">All models for provider</option>
                            <template x-for="modelID in executionPlanModelOptions(executionPlanForm.scope_provider)" :key="executionPlanForm.scope_provider + '-' + modelID">
                                <option :value="modelID" x-text="modelID"></option>
                            </template>
                        </select>
                    </label>

                    <label class="alias-form-field">
                        <span>Name</span>
                        <input type="text" class="filter-input execution-plan-input" placeholder="Optional. Defaults to scope label." x-model="executionPlanForm.name">
                    </label>

                    <label class="alias-form-field">
                        <span>User Path</span>
                        <input type="text" class="filter-input execution-plan-input" placeholder="team/alpha or /team/alpha" x-model="executionPlanForm.scope_user_path">
                    </label>
                </div>

                <p class="alias-form-hint">Leave provider name empty to target all providers and models. Select a provider name without a model to target all models for that configured provider.</p>
                <p class="alias-form-hint">Add a path to scope the workflow to that subtree. Leading slashes are optional and will be normalized; you can enter &quot;team/alpha&quot; or &quot;/team/alpha&quot;. Matching checks the deepest user path first, then falls back toward the root.</p>
                <p class="alias-form-hint">If you leave the name empty, the workflow will display as the matched provider/model scope or “All models”.</p>

                <label class="alias-form-field">
                    <span>Description</span>
                    <textarea class="alias-form-textarea" placeholder="Optional operator note for why this version exists." x-model="executionPlanForm.description"></textarea>
                </label>

                <div class="execution-plan-feature-toggles">
                    <label class="execution-plan-feature-toggle" x-show="executionPlanCacheVisible()">
                        <input type="checkbox" x-model="executionPlanForm.features.cache">
                        <span>Cache</span>
                    </label>
                    <label class="execution-plan-feature-toggle" x-show="executionPlanAuditVisible()">
                        <input type="checkbox" x-model="executionPlanForm.features.audit">
                        <span>Audit Logs</span>
                    </label>
                    <label class="execution-plan-feature-toggle" x-show="executionPlanUsageVisible()">
                        <input type="checkbox" x-model="executionPlanForm.features.usage">
                        <span>Usage</span>
                    </label>
                    <label class="execution-plan-feature-toggle" x-show="executionPlanGuardrailsVisible()">
                        <input type="checkbox" x-model="executionPlanForm.features.guardrails">
                        <span>Guardrails</span>
                    </label>
                    <label class="execution-plan-feature-toggle" x-show="executionPlanFailoverVisible()">
                        <input type="checkbox" x-model="executionPlanForm.features.fallback">
                        <span>Failover</span>
                    </label>
                </div>

                <div class="execution-plan-preview">
                    <div class="execution-plan-section-head">
                        <h4>Preview</h4>
                        <span class="provider-badge">Live</span>
                    </div>

                    <article class="execution-plan-card execution-plan-preview-card">
                        <div class="execution-plan-card-head">
                            <div>
                                <p class="alias-form-kicker" x-text="planScopeTypeLabel(executionPlanPreview())"></p>
                                <h3 x-text="workflowDisplayName(executionPlanPreview())"></h3>
                            </div>
                            <div class="execution-plan-card-badges">
                                <span class="provider-badge" x-text="planScopeLabel(executionPlanPreview())"></span>
                            </div>
                        </div>

                        <p class="execution-plan-card-description" x-show="executionPlanPreview().description" x-text="executionPlanPreview().description"></p>
                        <p class="alias-form-hint" x-show="executionPlanFailoverVisible()" x-text="'Failover: ' + executionPlanFallbackLabel(executionPlanPreview())"></p>

                        {{template "execution-plan-chart" "executionPlanWorkflowChart(executionPlanPreview())"}}

                        <div class="execution-plan-guardrails" x-show="executionPlanGuardrailsVisible()">
                            <div class="execution-plan-section-head">
                                <h4>Guardrails</h4>
                                <span class="provider-badge" x-text="planGuardrails(executionPlanPreview()).length ? planGuardrails(executionPlanPreview()).length + ' steps' : 'None'"></span>
                            </div>
                            <div class="execution-plan-guardrail-list" x-show="planGuardrails(executionPlanPreview()).length > 0">
                                <template x-for="(step, stepIndex) in planGuardrails(executionPlanPreview())" :key="'draft-workflow-preview-guardrail-' + stepIndex">
                                    <div class="execution-plan-guardrail-item">
                                        <span class="mono font-size-md" x-text="step.ref"></span>
                                        <span class="provider-badge" x-text="'step ' + step.step"></span>
                                    </div>
                                </template>
                            </div>
                            <p class="alias-form-hint" x-show="planGuardrails(executionPlanPreview()).length === 0">No guardrails configured for this plan.</p>
                        </div>
                    </article>
                </div>

	                <div class="execution-plan-guardrail-editor" x-show="executionPlanForm.features.guardrails && executionPlanGuardrailsVisible()">
                    <div class="execution-plan-section-head">
                        <div>
                            <h4>Guardrail Steps</h4>
                            <p class="alias-form-hint">Guardrails in the same numeric step run together. Later steps wait for earlier ones to finish.</p>
                        </div>
                        <button type="button" class="table-action-btn" @click="addExecutionPlanGuardrailStep()">Add Step</button>
                    </div>

                    <div class="alert alert-warning alert-inline-actions" x-show="guardrailRefs.length === 0">
                        <span>No named guardrails are currently registered on this deployment. You can still draft a plan, but guardrail-backed creation may be rejected.</span>
                        <button type="button" class="table-action-btn" @click="navigate('guardrails')">Open Guardrails</button>
                    </div>

                    <div class="execution-plan-guardrail-list-editor" x-show="executionPlanForm.guardrails.length > 0">
                        <template x-for="(step, index) in executionPlanForm.guardrails" :key="'execution-plan-form-guardrail-' + index">
                            <div class="execution-plan-guardrail-row">
                                <input type="text" class="filter-input execution-plan-input" list="execution-plan-guardrail-options" placeholder="Guardrail ref" x-model="step.ref" :aria-label="'Guardrail reference ' + (index + 1)">
                                <input type="number" class="filter-input execution-plan-step-input" min="0" step="10" placeholder="Step" x-model.number="step.step" :aria-label="'Guardrail step ' + (index + 1)">
                                <button type="button" class="table-action-btn table-action-btn-danger" @click="removeExecutionPlanGuardrailStep(index)">Remove</button>
                            </div>
                        </template>
                    </div>

                    <p class="alias-form-hint" x-show="executionPlanForm.guardrails.length === 0">No guardrail steps configured yet.</p>
                </div>

                <div class="alias-form-actions">
                    <button type="button" class="pagination-btn" @click="closeExecutionPlanForm()">Cancel</button>
                    <button type="submit" class="pagination-btn pagination-btn-primary execution-plan-submit-btn" :disabled="executionPlanSubmitting">
                        <span class="execution-plan-submit-icon" aria-hidden="true">
                            <svg x-show="executionPlanSubmitMode() === 'create'" viewBox="0 0 24 24">
                                <path d="M12 5v14"></path>
                                <path d="M5 12h14"></path>
                            </svg>
                            <svg x-show="executionPlanSubmitMode() === 'save'" viewBox="0 0 24 24">
                                <path d="M5 4h11l3 3v13H5z"></path>
                                <path d="M8 4v6h8"></path>
                                <path d="M8 20v-6h8v6"></path>
                            </svg>
                        </span>
                        <span x-text="executionPlanSubmitting ? executionPlanSubmittingLabel() : executionPlanSubmitLabel()"></span>
                    </button>
                </div>
            </form>
        </section>

        <section class="execution-plans-list">
            <p class="empty-state" x-show="executionPlansLoading && !authError">Loading workflows...</p>

            <div class="execution-plan-card-grid" x-show="filteredExecutionPlans.length > 0">
                <template x-for="plan in filteredExecutionPlans" :key="plan.id">
                    <article class="execution-plan-card">
                        <div class="execution-plan-card-head">
                            <div>
                                <p class="alias-form-kicker" x-text="planScopeTypeLabel(plan)"></p>
                                <h3 x-text="workflowDisplayName(plan)"></h3>
                            </div>
                            <div class="execution-plan-card-badges">
                                <span class="provider-badge" x-text="planScopeLabel(plan)"></span>
                            </div>
                        </div>

                        <p class="execution-plan-card-description" x-show="plan.description" x-text="plan.description"></p>
                        <p class="alias-form-hint" x-show="executionPlanFailoverVisible()" x-text="'Failover: ' + executionPlanFallbackLabel(plan)"></p>

                        {{template "execution-plan-chart" "executionPlanWorkflowChart(plan)"}}

	                        <div class="execution-plan-guardrails" x-show="executionPlanGuardrailsVisible()">
                            <div class="execution-plan-section-head">
                                <h4>Guardrails</h4>
                                <span class="provider-badge" x-text="planGuardrails(plan).length ? planGuardrails(plan).length + ' steps' : 'None'"></span>
                            </div>
                            <div class="execution-plan-guardrail-list" x-show="planGuardrails(plan).length > 0">
                                <template x-for="(step, stepIndex) in planGuardrails(plan)" :key="plan.id + '-guardrail-' + stepIndex">
                                    <div class="execution-plan-guardrail-item">
                                        <span class="mono font-size-md" x-text="step.ref"></span>
                                        <span class="provider-badge" x-text="'step ' + step.step"></span>
                                    </div>
                                </template>
                            </div>
                            <p class="alias-form-hint" x-show="planGuardrails(plan).length === 0">No guardrails configured for this plan.</p>
                        </div>

                        <div class="execution-plan-card-footer">
                            <div class="alias-actions-cell">
                                <button type="button"
                                        class="table-action-btn table-action-btn-danger"
                                        :disabled="executionPlanDeactivatingID === plan.id || !canDeactivateExecutionPlan(plan)"
                                        :aria-label="'Deactivate workflow ' + workflowDisplayName(plan)"
                                        :title="canDeactivateExecutionPlan(plan) ? 'Deactivate active workflow' : 'The global workflow cannot be deactivated.'"
                                        @click="deactivateExecutionPlan(plan)"
                                        x-text="executionPlanDeactivatingID === plan.id ? 'Deactivating...' : 'Deactivate'"></button>
                                <button type="button"
                                        class="table-action-btn table-icon-btn"
                                        :aria-label="'Edit workflow ' + workflowDisplayName(plan)"
                                        :title="'Edit workflow ' + workflowDisplayName(plan)"
                                        @click="openExecutionPlanCreate(plan)">
                                    {{template "edit-icon"}}
                                </button>
                            </div>
                            <div class="execution-plan-card-meta execution-plan-card-meta-footer">
                                <span class="provider-badge mono" x-text="'version: v' + plan.version"></span>
                                <span class="provider-badge mono" x-text="'created: ' + formatTimestamp(plan.created_at)"></span>
                                <span class="provider-badge mono" x-text="'hash: ' + shortHash(plan.plan_hash)"></span>
                            </div>
                        </div>
                    </article>
                </template>
            </div>

            <p class="empty-state" x-show="executionPlans.length === 0 && !executionPlansLoading && !authError && executionPlansAvailable">No active workflows found.</p>
            <p class="empty-state" x-show="executionPlans.length > 0 && filteredExecutionPlans.length === 0 && !executionPlansLoading">No workflows match your filter.</p>
        </section>

    </div>

    <datalist id="execution-plan-guardrail-options">
        <template x-for="guardrailRef in guardrailRefs" :key="guardrailRef">
            <option :value="guardrailRef"></option>
        </template>
    </datalist>
</div>
</template>

<!-- Audit Logs Page -->
<template x-if="page==='audit-logs'">
<div>
    <div class="page-header">
        <h2>Audit Logs</h2>
        <div class="page-header-controls">
            {{template "date-picker" .}}
        </div>
    </div>

    <!-- Auth Error Banner -->
    {{template "auth-banner" .}}

    <div class="audit-log-section">
        <div class="audit-log-toolbar">
            <div class="audit-filter-row audit-filter-row-search">
                <input id="audit-filter-search" type="text" placeholder="Search by request ID, model, provider, path, user path, or error..." aria-label="Search by request ID, model, provider, path, user path, or error" x-model="auditSearch" @input.debounce.300ms="fetchAuditLog(true)" class="filter-input">
            </div>
            <div class="audit-filter-row audit-filter-row-controls">
                <select id="audit-filter-method" aria-label="HTTP method filter" x-model="auditMethod" @change="fetchAuditLog(true)" class="usage-log-select audit-filter-select">
                    <option value="">All Methods</option>
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="PATCH">PATCH</option>
                    <option value="DELETE">DELETE</option>
                </select>
                <select id="audit-filter-status" aria-label="Status code filter" x-model="auditStatusCode" @change="fetchAuditLog(true)" class="usage-log-select audit-filter-select">
                    <option value="">All Statuses</option>
                    <option value="200">200</option>
                    <option value="201">201</option>
                    <option value="400">400</option>
                    <option value="401">401</option>
                    <option value="403">403</option>
                    <option value="404">404</option>
                    <option value="429">429</option>
                    <option value="500">500</option>
                    <option value="502">502</option>
                    <option value="503">503</option>
                </select>
                <select id="audit-filter-stream" aria-label="Streaming mode filter" x-model="auditStream" @change="fetchAuditLog(true)" class="usage-log-select audit-filter-select">
                    <option value="">All Modes</option>
                    <option value="true">Streaming</option>
                    <option value="false">Non-streaming</option>
                </select>
                <button type="button" class="pagination-btn audit-clear-btn" @click="clearAuditFilters()">
                    {{template "x-icon"}}
                    <span>Clear</span>
                </button>
            </div>
        </div>

        <p class="audit-log-summary" x-show="auditLog.total > 0" x-text="'Showing ' + (auditLog.offset + 1) + '-' + Math.min(auditLog.offset + auditLog.limit, auditLog.total) + ' of ' + auditLog.total + ' logs'"></p>

        <div class="audit-log-list" x-show="auditLog.entries.length > 0">
            <template x-for="entry in auditLog.entries" :key="entry.id">
                <details class="audit-entry" @toggle="handleAuditEntryToggle($event, entry)">
                        <summary class="audit-entry-summary">
                            <div class="audit-entry-left">
                                <span class="audit-status-badge" :class="statusCodeClass(entry.status_code)" x-text="entry.status_code || '-'"></span>
                            <span class="audit-method-badge" x-text="entry.method || '-'"></span>
                            <span class="audit-provider-model mono" x-show="entry.requested_model || entry.model" x-text="entry.requested_model || entry.model"></span>
                            <span class="audit-path mono" x-text="entry.path || '-'"></span>
                            </div>
                            <div class="audit-entry-right">
                                <span class="mono font-size-md" x-text="formatTimestamp(entry.timestamp)" :title="timestampTitle(entry.timestamp)"></span>
                                <span class="mono font-size-md" x-text="formatDurationNs(entry.duration_ns)"></span>
                                <button type="button" class="audit-conversation-trigger"
                                    x-show="canShowConversation(entry)"
                                    title="Open interactions"
                                    aria-label="Open interactions"
                                    @click.stop.prevent="openConversation(entry, $el.closest('details'), true, $el)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 6l6 6-6 6"/>
                                </svg>
                            </button>
                        </div>
                    </summary>
                    <template x-if="isAuditEntryExpanded(entry)">
                        <div class="audit-entry-details">
                            <!-- Execution Pipeline (workflow + runtime view) -->
                            {{template "execution-plan-chart" "executionPlanAuditChart(entry)"}}

                            <div class="audit-request-response">
                                {{template "audit-pane" "auditRequestPane(entry)"}}
                                {{template "audit-pane" "auditResponsePane(entry)"}}
                            </div>

                            <div class="audit-entry-metadata">
                                <span class="audit-entry-metadata-label">Metadata:</span>
                                <div class="audit-entry-context">
                                    <span class="provider-badge" x-text="providerDisplayValue(entry) || '-'"></span>
                                    <span class="provider-badge mono" x-text="entry.requested_model || entry.model || '-'"></span>
                                    <span class="provider-badge mono" x-show="entry.user_path" x-text="entry.user_path"></span>
                                    <span class="provider-badge mono" x-text="'request_id: ' + (entry.request_id || '-')"></span>
                                    <span class="provider-badge mono" x-show="entry.client_ip" x-text="'ip: ' + entry.client_ip"></span>
                                    <span class="provider-badge mono" x-show="entry.auth_key_id" x-text="'auth_key_id: ' + entry.auth_key_id"></span>
                                    <span class="provider-badge audit-alias-badge" x-show="entry.alias_used">alias</span>
                                    <span class="provider-badge mono" x-show="entry.alias_used && entry.resolved_model" x-text="'resolved: ' + qualifiedResolvedModelDisplay(entry)"></span>
                                    <span class="provider-badge" x-show="entry.stream">stream</span>
                                    <span class="provider-badge" x-show="entry.error_type" x-text="entry.error_type"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </details>
            </template>
        </div>

        <p class="empty-state" x-show="auditLog.entries.length === 0 && !loading && !authError">No audit log entries found.</p>

        {{template "pagination" "auditLog"}}
    </div>

    <div class="conversation-overlay" x-show="conversationOpen" x-transition.opacity.duration.160ms aria-hidden="true" @click="closeConversation()"></div>
    <aside class="conversation-drawer"
           :class="{ open: conversationOpen }"
           x-ref="conversationDialog"
           tabindex="-1"
           role="dialog"
           aria-modal="true"
           :aria-hidden="(!conversationOpen).toString()"
           aria-labelledby="interactions-drawer-title"
           aria-describedby="interactions-drawer-content"
           @keydown.escape.window="conversationOpen && closeConversation()">
        <div class="conversation-drawer-header">
            <h3 id="interactions-drawer-title">Interactions</h3>
            <button type="button" class="pagination-btn" x-ref="conversationCloseBtn" aria-label="Close interactions" @click="closeConversation()">Close</button>
        </div>

        <div id="interactions-drawer-content">
            <div class="alert alert-warning" x-show="conversationError" x-text="conversationError"></div>
            <p class="empty-state" x-show="conversationLoading">Loading interactions...</p>
            <p class="empty-state" x-show="!conversationLoading && !conversationError && conversationMessages.length === 0">No interaction data available for this entry.</p>

            <div class="conversation-thread" x-show="conversationMessages.length > 0">
                <template x-for="msg in conversationMessages" :key="msg.uid">
                    <article :class="[msg.role === 'function_call' || msg.role === 'function_result' ? 'chat-function-note' : 'chat-message', msg.roleClass, msg.isAnchor ? 'is-anchor' : '']">
                        <details class="chat-function-note-details" x-show="msg.role === 'function_call' || msg.role === 'function_result'">
                            <summary class="chat-function-note-inner">
                                <span class="chat-function-label" x-text="msg.roleLabel"></span>
                                <span class="chat-function-detail" x-text="msg.role === 'function_call' ? (msg.toolCalls || []).map(tc => tc.name + '()').join(', ') : (msg.functionName ? msg.functionName + ': ' : '') + msg.text"></span>
                            </summary>
                            <pre class="chat-function-expanded" x-text="functionExpandedContent(msg)"></pre>
                        </details>
                        <header class="chat-message-meta" x-show="msg.role !== 'function_call' && msg.role !== 'function_result'">
                            <span class="chat-role" x-text="msg.roleLabel"></span>
                            <span class="mono chat-time" x-text="formatTimestamp(msg.timestamp)"></span>
                        </header>
                        <pre class="chat-content" x-show="msg.text && msg.role !== 'function_call' && msg.role !== 'function_result'" x-text="msg.text"></pre>
                        <footer class="chat-tool-calls" x-show="msg.toolCalls && msg.role !== 'function_call'">
                            <template x-for="(tc, tcIdx) in (msg.toolCalls || [])" :key="tc.name + '-' + tcIdx">
                                <div class="chat-tool-call">
                                    <span class="chat-tool-call-name" x-text="tc.name + '()'"></span>
                                </div>
                            </template>
                        </footer>
                    </article>
                </template>
            </div>
        </div>

        <div class="conversation-drawer-footer" x-show="conversationAnchorID">
            <p class="conversation-meta" x-text="'Opened from log: ' + conversationAnchorID"></p>
        </div>
    </aside>
</div>
</template>
{{end}}
